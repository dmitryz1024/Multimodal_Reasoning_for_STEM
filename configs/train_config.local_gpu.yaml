# Safer preset for a local 16 GB GPU workstation.
# Keeps the effective batch size equal to the default config:
# 2 per-device * 8 grad accumulation = 16 effective batch size.

model:
  name: "HuggingFaceTB/SmolVLM-256M-Instruct"
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
  load_in_4bit: true
  load_in_8bit: false

data:
  primary_dataset: "linxy/LaTeX_OCR"
  primary_subset: "human_handwrite"
  secondary_dataset: "deepcopy/MathWriting-human"
  use_secondary: false
  secondary_sample_size: 10000
  max_samples_train: null
  max_samples_val: null
  test_subset: "human_handwrite"

training:
  output_dir: "./checkpoints"
  num_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  gradient_checkpointing: true
  save_strategy: "epoch"
  eval_strategy: "epoch"
  logging_steps: 10
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  seed: 42

preprocessing:
  max_length: 512
  image_size: 384
