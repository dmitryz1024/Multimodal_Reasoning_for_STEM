# Starter config for Qwen2-VL-2B fine-tuning.
# This is intended as a safer first run after the failed SmolVLM experiments.

model:
  name: "Qwen/Qwen2-VL-2B-Instruct"
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
  load_in_4bit: true
  load_in_8bit: false

data:
  primary_dataset: "linxy/LaTeX_OCR"
  primary_subset: "human_handwrite"
  secondary_dataset: "deepcopy/MathWriting-human"
  use_secondary: false
  secondary_sample_size: 2000
  max_samples_train: null
  max_samples_val: null
  test_subset: "human_handwrite"

training:
  output_dir: "./checkpoints"
  num_epochs: 2
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  gradient_checkpointing: true
  save_strategy: "epoch"
  eval_strategy: "epoch"
  logging_steps: 5
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  seed: 42

preprocessing:
  max_length: 2048
  image_size: 384
