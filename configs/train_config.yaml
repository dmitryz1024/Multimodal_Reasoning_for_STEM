# Training Configuration for Handwritten LaTeX OCR

# Model settings
model:
  name: "HuggingFaceTB/SmolVLM-256M-Instruct"  # Base model
  # Alternative models:
  # - "Qwen/Qwen2-VL-2B-Instruct"
  # - "Qwen/Qwen2.5-VL-3B-Instruct"
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
  load_in_4bit: true
  load_in_8bit: false

# Dataset settings
data:
  primary_dataset: "linxy/LaTeX_OCR"
  primary_subset: "human_handwrite"  # Options: default, full, human_handwrite, human_handwrite_print, small, synthetic_handwrite
  secondary_dataset: "deepcopy/MathWriting-human"
  use_secondary: false  # Set to true for combined training
  secondary_sample_size: 10000  # Number of samples from MathWriting if too large
  test_subset: "human_handwrite"
  max_samples_train: null  # Set to limit training samples (null = use all)
  max_samples_val: null

# Training hyperparameters
training:
  output_dir: "./checkpoints"
  num_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  gradient_checkpointing: true
  save_strategy: "epoch"
  eval_strategy: "epoch"
  logging_steps: 10
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  seed: 42

# Data processing
preprocessing:
  max_length: 512
  image_size: 384
  
# Prompt templates
prompts:
  system: "You are a LaTeX OCR assistant. Convert the handwritten mathematical formula in the image to LaTeX code."
  user_template: "Convert this handwritten formula to LaTeX:"
  one_shot_example:
    image_description: "Handwritten formula showing x squared plus y squared equals z squared"
    latex: "x^2 + y^2 = z^2"

# Evaluation settings
evaluation:
  metrics:
    - "bleu"
    - "exact_match"
    - "edit_distance"
    - "token_accuracy"
  num_test_samples: 70  # As specified in task

# Logging
logging:
  use_wandb: false
  wandb_project: null
  wandb_run_name: null  # Auto-generated if null
  log_level: "info"
