services:
  latex-ocr:
    build: .
    # Note: GPU support requires Docker Desktop with GPU enabled
    env_file:
      - .env
    environment:
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - .:/app  # Mount current directory for development
      - ./checkpoints:/app/checkpoints  # Persist checkpoints
      - ./report:/app/report  # Persist reports
    ports:
      - "8501:8501"  # Streamlit port
    command: ["streamlit", "run", "app/streamlit_app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]

  # Optional: Training service
  train:
    build: .
    env_file:
      - .env
    environment:
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - .:/app
      - ./checkpoints:/app/checkpoints
    command: ["python", "src/train.py", "--config", "configs/train_config.yaml"]